async function sha256(m){const b=new TextEncoder().encode(m);const h=await crypto.subtle.digest("SHA-256",b);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,"0")).join("")}
async function unlock(){
const p=document.getElementById("passInput").value;
const h=await sha256(p);
if(h===HASH){
document.getElementById("lockScreen").style.display="none";
const c=document.getElementById("content");
c.style.display="block";
c.innerHTML=decodeURIComponent(escape(atob(ENCODED)));
document.body.style.display="block";
}else{
document.getElementById("errorMsg").style.display="block";
document.getElementById("passInput").style.borderColor="#ef4444";
setTimeout(()=>{document.getElementById("errorMsg").style.display="none";document.getElementById("passInput").style.borderColor="rgba(255,107,107,0.5)"},2000);
}}
document.getElementById("passInput").addEventListener("keydown",e=>{if(e.key==="Enter")unlock()});
</script>
